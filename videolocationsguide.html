<!DOCTYPE html>
<html>
<head>
    <title>Setup Guide</title>
    <link rel="icon" type="image/x-icon" href="./images/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
    <body> 
        <div class="container">
            <!-- Make dark mode -->
            <meta name    = "color-scheme" content = "light dark"/>
            
            <div id="header-container"></div>
                <br><br><br><br>
                <iframe style="margin:auto; display:block;" width="560" height="315" src="https://www.youtube.com/embed/ygWk6rXfn6c?si=cB3e5r_KaD5DbY7y" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<script>
    fetch('header.html')
        .then(response => response.text())
        .then(html => {
            document.getElementById('header-container').innerHTML = html;
            document.getElementById('page-subtitle').textContent = 'Video Locations Guide';
        });
</script>
</div>
    </body>
</html>
