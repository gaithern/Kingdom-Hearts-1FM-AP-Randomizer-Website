<!DOCTYPE html>
<html>
<head>
    <title>Kingdom Hearts Archipelago Randomizer</title>
    <link rel="icon" type="image/x-icon" href="./images/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
    <body class="has-hero-video">
        <div class="container">
            <!-- Make dark mode -->
            <meta name    = "color-scheme" content = "light dark"/>

            <div id="header-container"></div>

            <script>
                fetch('header.html')
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('header-container').innerHTML = html;
                        document.getElementById('page-subtitle').textContent = 'Home';
                    });
            </script>

            <section class="hero-video">
                <div class="hero-video__media">
                    <video autoplay loop muted playsinline poster="video/op_loop_poster.jpg">
                        <source src="video/op_loop_720.webm" type="video/webm">
                        <source src="video/op_loop_720.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="hero-video__overlay"></div>
                <div class="hero-video__content">
                    <div class="hero-video__inner">
                        <h2 class="hero__tagline">"This world has been connected."</h2>
                        <p class="hero__lead">
                            Kingdom Hearts meets endless replayability.<br>
                            Full Multiworld randomizer support via Archipelago.
                        </p>
                        <div class="hero__actions">
                            <a class="cta-button" href="generate_a_seed">Generate a Seed</a>
                            <a class="cta-button cta-button--secondary" href="setup_guide">Setup Guide</a>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </body>
</html>
